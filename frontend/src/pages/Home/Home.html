<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>HDPA</title>

  <link rel="stylesheet" href="Home.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">

      <div class="logoArea">
        <img
          src="./assets/img/LOGO2.png"
          class="logoImage"
          alt="Logo"
        />
      </div>

      <nav class="menu">

        <div class="menuItem">
          <span>Home</span>
        </div>

        <div class="menuItem">
          <span>Vestibulares</span>
        </div>

        <div class="menuItem">
          <span>Desempenho</span>
        </div>

        <div class="menuItem">
          <span>Estudos</span>
        </div>

      </nav>

      <button class="profileButton">
        👤
      </button>

    </header>

    <!-- HERO -->
    <section class="hero">

      <img
        src="./assets/img/banner2.png"
        class="heroImage"
        alt="Banner"
      />

    </section>

    <!-- FACULDADES -->
    <section class="section">

      <h2>Faculdades</h2>

      <div class="carouselWrapper">

        <button
          class="arrowButton"
          id="prevButton"
        >
          ←
        </button>

        <div
          class="carousel"
          id="carousel"
        >
        </div>

        <button
          class="arrowButton"
          id="nextButton"
        >
          →
        </button>

      </div>

    </section>

    <!-- VISÃO GERAL -->
    <section class="section">

      <h2>Visão Geral</h2>

      <div class="overview">

        <div class="card">

          <h3>Desempenho</h3>

          <div class="pieChart"></div>

          <div class="progressArea">

            <div class="progress">
              <span>Matemática</span>
              <span>87%</span>
            </div>

            <div class="progress progressDark">
              <span>Redação</span>
              <span>93%</span>
            </div>

            <div class="progress">
              <span>Natureza</span>
              <span>72%</span>
            </div>

          </div>

        </div>

        <div class="card">

          <h3>Progresso Semanal</h3>

          <div class="barChart">

            <div class="barRow">
              <span>SEG</span>
              <div class="bar bar1"></div>
            </div>

            <div class="barRow">
              <span>TER</span>
              <div class="bar bar2"></div>
            </div>

            <div class="barRow">
              <span>QUA</span>
              <div class="bar bar3"></div>
            </div>

            <div class="barRow">
              <span>QUI</span>
              <div class="bar bar4"></div>
            </div>

          </div>

        </div>

      </div>

    </section>

    <!-- AVALIAÇÃO -->
    <section class="section">

      <h2>Avaliações</h2>

      <div class="reviewCard">

        <img
          src="./assets/img/tupi.png"
          alt="Perfil"
        />

        <div class="reviewContent">

          <div class="reviewTop">

            <h4>Amanda Barbosa</h4>

            <div class="stars">
              ★★★★★
            </div>

          </div>

          <p>
            Plataforma organizada, moderna e perfeita
            para acompanhar os estudos para vestibulares
            e ENEM.
          </p>

        </div>

      </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer"></footer>

  </div>

  <script src="script.js"></script>

</body>
</html>
